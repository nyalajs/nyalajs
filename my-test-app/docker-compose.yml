version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nyala-mvc-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=nyala_mvc
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=development-secret-key
    depends_on:
      - postgres
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - nyala-network

  postgres:
    image: postgres:15-alpine
    container_name: nyala-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nyala_mvc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nyala-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  nyala-network:
    driver: bridge
